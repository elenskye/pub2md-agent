# nginx site config for Pub2MD (reverse proxy in front of gunicorn).
# Install: sudo cp deploy/nginx.conf /etc/nginx/sites-available/pub2md
#          sudo ln -s /etc/nginx/sites-available/pub2md /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
# TLS: run `sudo certbot --nginx -d pub2md.duckdns.org` afterwards — certbot
# rewrites this file with the certificate blocks.

server {
    listen 80;
    server_name pub2md.duckdns.org;  # change if you use a different domain

    client_max_body_size 30m;  # must exceed PUB2MD_MAX_UPLOAD_MB

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }
}
